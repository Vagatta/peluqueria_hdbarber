services:
  - type: web
    name: peluqueria-hdbarber-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.render
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: hdbarber-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hdbarber-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: hdbarber-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: hdbarber-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hdbarber-db
          property: password
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://hdbarber.vercel.app
    buildCommand: |
      php artisan config:cache
      php artisan route:cache
      php artisan migrate --force

databases:
  - name: hdbarber-db
    databaseName: hdbarber
    user: hdbarber
    plan: starter
