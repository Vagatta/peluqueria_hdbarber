services:
  db:
    image: mariadb:11
    container_name: hdbarber_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: hdbarber
      MARIADB_USER: hdbarber
      MARIADB_PASSWORD: hdbarber
    ports:
      # Acceso desde el host (DBeaver, HeidiSQL, etc.). Cambia el puerto si está ocupado.
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hdbarber_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: hdbarber
      DB_USERNAME: hdbarber
      DB_PASSWORD: hdbarber

  web:
    image: nginx:1.27-alpine
    container_name: hdbarber_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hdbarber_mail
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hdbarber_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    ports:
      - "8082:80"
    depends_on:
      - db

volumes:
  db_data:
